name: lint

on:
  pull_request:
    branches: [master]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".gitignore"

permissions:
  contents: read
  pull-requests: write   # reviewdog needs this to post inline review comments
  checks: write          # for the check-run summary

jobs:
  golangci-lint:
    name: golangci-lint (diff-only)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.1
        with:
          # reviewdog needs the merge-base to compute the PR diff.
          fetch-depth: 0

      - name: Set up Go
        uses: ./.github/actions/setup-go

      - name: Install dependencies
        run: go mod download

      # reviewdog wraps golangci-lint and posts only NEW findings introduced
      # by the PR diff as inline review comments. Pre-existing baseline
      # diagnostics are not reported, so this never blocks unrelated PRs on
      # legacy noise.
      - name: golangci-lint via reviewdog (PR diff only)
        uses: reviewdog/action-golangci-lint@v2
        with:
          go_version_file: go.mod
          # golangci-lint v2.x is required because the chain is on Go 1.25
          # (v1.x is built with Go 1.24 and refuses Go 1.25 modules).
          # Config in .golangci.yml uses the v2 schema.
          golangci_lint_version: v2.0.2
          golangci_lint_flags: "--config=.golangci.yml --timeout=5m"
          workdir: .
          # Only annotate lines actually changed by the PR.
          filter_mode: added
          reporter: github-pr-review
          fail_level: error
          level: warning
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
