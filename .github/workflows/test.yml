name: tests

on:
  push:
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
  pull_request:
    branches: [ master ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'

jobs:
  unit-tests:
    name: unit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.1

      - name: Set up Go
        uses: ./.github/actions/setup-go

      - name: Install dependencies
        run: go mod download

      - name: Run unit tests
        run: make unit-tests

  cli-help-smoke:
    name: cli-help-smoke
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.1

      - name: Set up Go
        uses: ./.github/actions/setup-go

      - name: Install dependencies
        run: go mod download

      - name: Build lumerad
        run: go build -o ./build/lumerad ./cmd/lumera

      - name: Smoke test generated CLI help
        run: bash ./scripts/cli-help-smoke.sh ./build/lumerad

  integration-tests:
    name: integration
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.1

      - name: Set up Go
        uses: ./.github/actions/setup-go

      - name: Install dependencies
        run: go mod download

      - name: Run integration tests
        run: make integration-tests

  simulation-tests:
    name: simulation
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.1

      - name: Set up Go
        uses: ./.github/actions/setup-go

      - name: Install dependencies
        run: go mod download

      - name: Run simulation benchmark
        run: make simulation-bench
