name: tests

on:
  push:
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'

jobs:
  unit-tests:
    name: unit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.1

      - name: Set up Go
        uses: ./.github/actions/setup-go

      - name: Install Ignite CLI
        uses: ./.github/actions/install-ignite

      - name: Install dependencies
        run: go mod download

      - name: Run unit tests
        run: go test -v ./x/...

  integration-tests:
    name: integration
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.1

      - name: Set up Go
        uses: ./.github/actions/setup-go

      - name: Install Ignite CLI
        uses: ./.github/actions/install-ignite

      - name: Install dependencies
        run: go mod download

      - name: Generate OpenRPC spec
        run: make openrpc

      - name: Run integration tests
        run: go test -tags=integration,test -p 4 ./tests/integration/... -v

  simulation-tests:
    name: simulation
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.1

      - name: Set up Go
        uses: ./.github/actions/setup-go

      - name: Install Ignite CLI
        uses: ./.github/actions/install-ignite

      - name: Install dependencies
        run: go mod download

      - name: Generate OpenRPC spec
        run: make openrpc

      - name: Run simulation tests
        env:
          GOMAXPROCS: 2
          IGNITE_TELEMETRY_CONSENT: "no"
        run: |
          go test -v -benchmem -run=^$ -bench ^BenchmarkSimulation -cpuprofile cpu.out ./app -Commit=true
