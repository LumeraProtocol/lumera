name: tests

on:
  push:
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'

jobs:
  unit-tests:
    name: unit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.1

      - name: Set up Go
        uses: ./.github/actions/setup-go

      - name: Copy claims.csv to home directory
        run: cp claims.csv $HOME/

      - name: Install Ignite CLI
        run: |
          curl https://get.ignite.com/cli! | bash
        env:
          IGNITE_CLI_NO_ANALYTICS: 1

      - name: Install dependencies
        run: go mod download

      - name: Run unit tests
        run: go test -v ./x/...

  cli-help-smoke:
    name: cli-help-smoke
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.1

      - name: Set up Go
        uses: ./.github/actions/setup-go

      - name: Install dependencies
        run: go mod download

      - name: Build lumerad
        run: go build -o ./build/lumerad ./cmd/lumera

      - name: Smoke test generated CLI help
        run: bash ./scripts/cli-help-smoke.sh ./build/lumerad

  integration-tests:
    name: integration
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.1

      - name: Set up Go
        uses: ./.github/actions/setup-go

      - name: Copy claims.csv to home directory
        run: cp claims.csv $HOME/

      - name: Install Ignite CLI
        run: |
          curl https://get.ignite.com/cli! | bash
        env:
          IGNITE_CLI_NO_ANALYTICS: 1

      - name: Install dependencies
        run: go mod download

      - name: Run integration tests
        run: go test -tags=integration ./tests/integration/... -v

  simulation-tests:
    name: simulation
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.1

      - name: Set up Go
        uses: ./.github/actions/setup-go

      - name: Copy claims.csv to home directory
        run: cp claims.csv $HOME/

      - name: Install Ignite CLI
        run: |
          curl https://get.ignite.com/cli! | bash
        env:
          IGNITE_CLI_NO_ANALYTICS: 1

      - name: Install dependencies
        run: go mod download

      - name: Run simulation tests
        env:
          GOMAXPROCS: 2
          IGNITE_TELEMETRY_CONSENT: "no"
        run: |
          go test -v -benchmem -run=^$ -bench ^BenchmarkSimulation -cpuprofile cpu.out ./app -Commit=true
