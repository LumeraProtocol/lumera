# golangci-lint v2 configuration for the Lumera chain repo.
#
# Pinned config so CI and local devs converge on the same rule set.
# Conservative on purpose: only correctness linters today. Style/complexity
# linters can be layered in later via separate PRs once the baseline is clean.
#
# Diff-only enforcement is configured in CI (.github/workflows/lint.yml)
# via reviewdog `filter_mode: added`. Locally:
#
#   golangci-lint run ./x/action/v1/... ./x/supernode/v1/... ./x/audit/v1/...
#   golangci-lint run --new-from-rev=origin/master ./...
#
# Note on Go version: golangci-lint v1.64.8 is built with Go 1.24 and
# refuses modules declaring `go 1.25` in go.mod. The Lumera chain is on
# Go 1.25.9, so we must use golangci-lint v2.x (built with Go 1.25+).
# v2 ships a breaking config-schema change — this file is the v2 schema.

version: "2"

run:
  timeout: 5m
  tests: true
  modules-download-mode: readonly

linters:
  default: none
  enable:
    - errcheck       # unchecked errors
    - govet          # suspicious constructs
    - ineffassign    # ineffectual assignments
    - staticcheck    # SA* + simple/style checks
    - unused         # dead code (funcs, consts, types, vars)

  settings:
    staticcheck:
      # SA1019 (deprecated API) is noisy in Cosmos SDK v0.50: HasInvariants,
      # InvariantRegistry, sdk.WrapSDKContext, etc. Per-site `//nolint:staticcheck`
      # with a rationale comment is preferred over a blanket disable.
      checks: ["all"]
    errcheck:
      exclude-functions:
        - (io.Closer).Close
        - (io.ReadCloser).Close

  exclusions:
    # `default` removes some genuinely useful findings; turn it off so we
    # control the exclude set explicitly.
    generated: lax
    rules:
      # Cosmos SDK v0.50 still ships HasInvariants / InvariantRegistry as the
      # required interface for AppModule. Module surface files must reference
      # them; deprecation only resolves when x/crisis is removed.
      - path: x/.*/v1/module/module\.go
        linters: [staticcheck]
        text: "SA1019.*(HasInvariants|InvariantRegistry)"

      # Generated proto code is not ours to lint.
      - path: \.pb\.go$
        linters: [errcheck, ineffassign, staticcheck, unused, govet]
      - path: \.pb\.gw\.go$
        linters: [errcheck, ineffassign, staticcheck, unused, govet]

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
