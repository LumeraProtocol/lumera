# golangci-lint configuration for Lumera chain repo.
#
# Pinned config so CI and local devs converge on the same rule set.
# Rule set is intentionally conservative — we enable only correctness
# linters today. Style/complexity linters can be layered in later via
# separate PRs once the baseline is clean.
#
# Diff-only enforcement is configured in CI (.github/workflows/lint.yml)
# via reviewdog `filter_mode: added`. Locally, run with:
#
#   golangci-lint run ./x/action/v1/... ./x/supernode/v1/... ./x/audit/v1/...
#
# or scoped to your branch's diff:
#
#   golangci-lint run --new-from-rev=origin/master ./...

run:
  timeout: 5m
  go: "1.25"
  tests: true
  modules-download-mode: readonly

linters:
  disable-all: true
  enable:
    - errcheck       # unchecked errors
    - govet          # suspicious constructs
    - ineffassign    # ineffectual assignments
    - staticcheck    # SA* + simple/style checks
    - unused         # dead code (funcs, consts, types, vars)
    - typecheck      # compile errors

linters-settings:
  staticcheck:
    # SA1019 (deprecated API) is noisy in Cosmos SDK v0.50: HasInvariants,
    # InvariantRegistry, and the migration path is gated on x/crisis removal.
    # We keep SA1019 enabled but expect per-site //nolint:staticcheck with a
    # rationale comment. To turn off SA1019 globally instead, list it here:
    #   checks: ["all", "-SA1019"]
    checks: ["all"]
  errcheck:
    # Don't require checking errors on these high-noise IO calls in tests.
    exclude-functions:
      - (io.Closer).Close
      - (io.ReadCloser).Close

issues:
  # Show all issues (don't cap silently).
  max-issues-per-linter: 0
  max-same-issues: 0

  exclude-rules:
    # Cosmos SDK v0.50 still ships HasInvariants / InvariantRegistry as the
    # required interface for AppModule. Module surface files must reference
    # them; deprecation only resolves when x/crisis is removed.
    - path: x/.*/v1/module/module\.go
      linters: [staticcheck]
      text: "SA1019.*(HasInvariants|InvariantRegistry)"

    # Generated proto code is not ours to lint.
    - path: \.pb\.go$
      linters: [errcheck, ineffassign, staticcheck, unused, govet]
    - path: \.pb\.gw\.go$
      linters: [errcheck, ineffassign, staticcheck, unused, govet]

  # Default exclusions remove some genuinely useful findings; keep them off.
  exclude-use-default: false
