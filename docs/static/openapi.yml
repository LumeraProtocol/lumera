equest.\n\n message SomeResponse {\n         repeated Bar results = 1;\n         PageResponse page = 2;\n }","type":"object","properties":{"next_key":{"description":"next_key is the key to be passed to PageRequest.key to\nquery the next page most efficiently. It will be empty if\nthere are no more results.","type":"string","format":"byte"},"total":{"type":"string","format":"uint64","title":"total is total number of results available if PageRequest.count_total\nwas set, its value is undefined otherwise"}}},"cosmos.base.v1beta1.Coin":{"description":"Coin defines a token with a denomination and an amount.\n\nNOTE: The amount field is an Int which implements the custom method\nsignatures required by gogoproto.","type":"object","properties":{"amount":{"type":"string"},"denom":{"type":"string"}}},"cosmos.evm.erc20.v1.MsgConvertCoinResponse":{"type":"object","title":"MsgConvertCoinResponse returns no fields"},"cosmos.evm.erc20.v1.MsgConvertERC20Response":{"type":"object","title":"MsgConvertERC20Response returns no fields"},"cosmos.evm.erc20.v1.MsgRegisterERC20":{"description":"MsgRegisterERC20 is the Msg/RegisterERC20 request type for registering\nan Erc20 contract token pair.","type":"object","properties":{"erc20addresses":{"type":"array","title":"erc20addresses is a slice of ERC20 token contract hex addresses","items":{"type":"string"}},"signer":{"type":"string","title":"signer is the address registering the erc20 pairs"}}},"cosmos.evm.erc20.v1.MsgRegisterERC20Response":{"description":"MsgRegisterERC20Response defines the response structure for executing a\nMsgRegisterERC20 message.","type":"object"},"cosmos.evm.erc20.v1.MsgToggleConversion":{"description":"MsgToggleConversion is the Msg/MsgToggleConversion request type for toggling\nan Erc20 contract conversion capability.","type":"object","properties":{"authority":{"description":"authority is the address of the governance account.","type":"string"},"token":{"type":"string","title":"token identifier can be either the hex contract address of the ERC20 or the\nCosmos base denomination"}}},"cosmos.evm.erc20.v1.MsgToggleConversionResponse":{"description":"MsgToggleConversionResponse defines the response structure for executing a\nToggleConversion message.","type":"object"},"cosmos.evm.erc20.v1.MsgUpdateParams":{"type":"object","title":"MsgUpdateParams is the Msg/UpdateParams request type for Erc20 parameters.\nSince: cosmos-sdk 0.47","properties":{"authority":{"description":"authority is the address of the governance account.","type":"string"},"params":{"description":"params defines the x/vm parameters to update.\nNOTE: All parameters must be supplied.","$ref":"#/definitions/cosmos.evm.erc20.v1.Params"}}},"cosmos.evm.erc20.v1.MsgUpdateParamsResponse":{"type":"object","title":"MsgUpdateParamsResponse defines the response structure for executing a\nMsgUpdateParams message.\nSince: cosmos-sdk 0.47"},"cosmos.evm.erc20.v1.Owner":{"description":"Owner enumerates the ownership of a ERC20 contract.\n\n - OWNER_UNSPECIFIED: OWNER_UNSPECIFIED defines an invalid/undefined owner.\n - OWNER_MODULE: OWNER_MODULE - erc20 is owned by the erc20 module account.\n - OWNER_EXTERNAL: OWNER_EXTERNAL - erc20 is owned by an external account.","type":"string","default":"OWNER_UNSPECIFIED","enum":["OWNER_UNSPECIFIED","OWNER_MODULE","OWNER_EXTERNAL"]},"cosmos.evm.erc20.v1.Params":{"type":"object","title":"Params defines the erc20 module params","properties":{"enable_erc20":{"description":"enable_erc20 is the parameter to enable the conversion of Cosmos coins \u003c--\u003e\nERC20 tokens.","type":"boolean"},"permissionless_registration":{"type":"boolean","title":"permissionless_registration is the parameter that allows ERC20s to be\npermissionlessly registered to be converted to bank tokens and vice versa"}}},"cosmos.evm.erc20.v1.QueryParamsResponse":{"description":"QueryParamsResponse is the response type for the Query/Params RPC\nmethod.","type":"object","properties":{"params":{"title":"params are the erc20 module parameters","$ref":"#/definitions/cosmos.evm.erc20.v1.Params"}}},"cosmos.evm.erc20.v1.QueryTokenPairResponse":{"description":"QueryTokenPairResponse is the response type for the Query/TokenPair RPC\nmethod.","type":"object","properties":{"token_pair":{"title":"token_pairs returns the info about a registered token pair for the erc20\nmodule","$ref":"#/definitions/cosmos.evm.erc20.v1.TokenPair"}}},"cosmos.evm.erc20.v1.QueryTokenPairsResponse":{"description":"QueryTokenPairsResponse is the response type for the Query/TokenPairs RPC\nmethod.","type":"object","properties":{"pagination":{"description":"pagination defines the pagination in the response.","$ref":"#/definitions/cosmos.base.query.v1beta1.PageResponse"},"token_pairs":{"type":"array","title":"token_pairs is a slice of registered token pairs for the erc20 module","items":{"type":"object","$ref":"#/definitions/cosmos.evm.erc20.v1.TokenPair"}}}},"cosmos.evm.erc20.v1.TokenPair":{"description":"TokenPair defines an instance that records a pairing (mapping) consisting of a native\nCosmos Coin and an ERC20 token address. The \"pair\" does not imply an asset swap exchange.","type":"object","properties":{"contract_owner":{"title":"contract_owner is the an ENUM specifying the type of ERC20 owner (0\ninvalid, 1 ModuleAccount, 2 external address)","$ref":"#/definitions/cosmos.evm.erc20.v1.Owner"},"denom":{"type":"string","title":"denom defines the cosmos base denomination to be mapped to"},"enabled":{"type":"boolean","title":"enabled defines the token mapping enable status"},"erc20_address":{"type":"string","title":"erc20_address is the hex address of ERC20 contract token"}}},"cosmos.evm.feemarket.v1.MsgUpdateParams":{"description":"MsgUpdateParams defines a Msg for updating the x/feemarket module parameters.","type":"object","properties":{"authority":{"description":"authority is the address of the governance account.","type":"string"},"params":{"description":"params defines the x/feemarket parameters to update.\nNOTE: All parameters must be supplied.","$ref":"#/definitions/cosmos.evm.feemarket.v1.Params"}}},"cosmos.evm.feemarket.v1.MsgUpdateParamsResponse":{"description":"MsgUpdateParamsResponse defines the response structure for executing a\nMsgUpdateParams message.","type":"object"},"cosmos.evm.feemarket.v1.Params":{"type":"object","title":"Params defines the EVM module parameters","properties":{"base_fee":{"description":"base_fee for EIP-1559 blocks.","type":"string"},"base_fee_change_denominator":{"description":"base_fee_change_denominator bounds the amount the base fee can change\nbetween blocks.","type":"integer","format":"int64"},"elasticity_multiplier":{"description":"elasticity_multiplier bounds the maximum gas limit an EIP-1559 block may\nhave.","type":"integer","format":"int64"},"enable_height":{"description":"enable_height defines at which block height the base fee calculation is\nenabled.","type":"string","format":"int64"},"min_gas_multiplier":{"type":"string","title":"min_gas_multiplier bounds the minimum gas used to be charged\nto senders based on gas limit"},"min_gas_price":{"type":"string","title":"min_gas_price defines the minimum gas price value for cosmos and eth\ntransactions"},"no_base_fee":{"type":"boolean","title":"no_base_fee forces the EIP-1559 base fee to 0 (needed for 0 price calls)"}}},"cosmos.evm.feemarket.v1.QueryBaseFeeResponse":{"description":"QueryBaseFeeResponse returns the EIP1559 base fee.","type":"object","properties":{"base_fee":{"type":"string","title":"base_fee is the EIP1559 base fee"}}},"cosmos.evm.feemarket.v1.QueryBlockGasResponse":{"description":"QueryBlockGasResponse returns block gas used for a given height.","type":"object","properties":{"gas":{"type":"string","format":"int64","title":"gas is the returned block gas"}}},"cosmos.evm.feemarket.v1.QueryParamsResponse":{"description":"QueryParamsResponse defines the response type for querying x/vm parameters.","type":"object","properties":{"params":{"description":"params define the ev