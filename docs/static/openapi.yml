{"type":"string","format":"int64"},"params_commitment":{"description":"params_commitment is a hash commitment to Params (with defaults) at epoch start.","type":"string","format":"byte"},"seed":{"description":"seed is a fixed 32-byte value derived at epoch start (domain-separated).","type":"string","format":"byte"},"target_supernode_accounts":{"description":"target_supernode_accounts is the sorted list of eligible targets at epoch start:\nACTIVE + POSTPONED supernodes.","type":"array","items":{"type":"string"}},"targets_set_commitment":{"type":"string","format":"byte"}}},"lumera.audit.v1.EpochReport":{"description":"EpochReport is a single per-epoch report submitted by a Supernode.","type":"object","properties":{"epoch_id":{"type":"string","format":"uint64"},"host_report":{"$ref":"#/definitions/lumera.audit.v1.HostReport"},"report_height":{"type":"string","format":"int64"},"storage_challenge_observations":{"type":"array","items":{"type":"object","$ref":"#/definitions/lumera.audit.v1.StorageChallengeObservation"}},"supernode_account":{"type":"string"}}},"lumera.audit.v1.Evidence":{"description":"Evidence is a stable outer record that stores evidence about an audited subject.\nType-specific fields are encoded into the `metadata` bytes field.","type":"object","properties":{"action_id":{"description":"action_id optionally links this evidence to a specific action.","type":"string"},"evidence_id":{"description":"evidence_id is a chain-assigned unique identifier.","type":"string","format":"uint64"},"evidence_type":{"description":"evidence_type is a stable discriminator used to interpret metadata.","$ref":"#/definitions/lumera.audit.v1.EvidenceType"},"metadata":{"description":"metadata is protobuf-binary bytes of a type-specific Evidence metadata message.","type":"string","format":"byte"},"reported_height":{"description":"reported_height is the block height when the evidence was submitted.","type":"string","format":"uint64"},"reporter_address":{"description":"reporter_address is the submitter of the evidence.","type":"string"},"subject_address":{"description":"subject_address is the audited subject (e.g. supernode-related actor).","type":"string"}}},"lumera.audit.v1.EvidenceType":{"description":" - EVIDENCE_TYPE_ACTION_FINALIZATION_SIGNATURE_FAILURE: action finalization rejected due to an invalid signature / signature-derived data.\n - EVIDENCE_TYPE_ACTION_FINALIZATION_NOT_IN_TOP_10: action finalization rejected because the attempted finalizer is not in the top-10 supernodes.\n - EVIDENCE_TYPE_STORAGE_CHALLENGE_FAILURE: storage challenge failure evidence submitted by the deterministic challenger.\n - EVIDENCE_TYPE_CASCADE_CLIENT_FAILURE: client-observed cascade flow failure (upload/download).","type":"string","default":"EVIDENCE_TYPE_UNSPECIFIED","enum":["EVIDENCE_TYPE_UNSPECIFIED","EVIDENCE_TYPE_ACTION_FINALIZATION_SIGNATURE_FAILURE","EVIDENCE_TYPE_ACTION_FINALIZATION_NOT_IN_TOP_10","EVIDENCE_TYPE_ACTION_EXPIRED","EVIDENCE_TYPE_STORAGE_CHALLENGE_FAILURE","EVIDENCE_TYPE_CASCADE_CLIENT_FAILURE"]},"lumera.audit.v1.HostReport":{"description":"HostReport is the Supernode's self-reported host metrics and counters for an epoch.","type":"object","properties":{"cpu_usage_percent":{"type":"number","format":"double"},"disk_usage_percent":{"type":"number","format":"double"},"failed_actions_count":{"type":"integer","format":"int64"},"inbound_port_states":{"type":"array","items":{"$ref":"#/definitions/lumera.audit.v1.PortState"}},"mem_usage_percent":{"type":"number","format":"double"}}},"lumera.audit.v1.HostReportEntry":{"type":"object","properties":{"epoch_id":{"type":"string","format":"uint64"},"host_report":{"$ref":"#/definitions/lumera.audit.v1.HostReport"},"report_height":{"type":"string","format":"int64"}}},"lumera.audit.v1.MsgSubmitEpochReport":{"type":"object","properties":{"creator":{"description":"creator is the transaction signer.","type":"string"},"epoch_id":{"type":"string","format":"uint64"},"host_report":{"$ref":"#/definitions/lumera.audit.v1.HostReport"},"storage_challenge_observations":{"type":"array","items":{"type":"object","$ref":"#/definitions/lumera.audit.v1.StorageChallengeObservation"}}}},"lumera.audit.v1.MsgSubmitEpochReportResponse":{"type":"object"},"lumera.audit.v1.MsgSubmitEvidence":{"type":"object","properties":{"action_id":{"type":"string"},"creator":{"type":"string"},"evidence_type":{"$ref":"#/definitions/lumera.audit.v1.EvidenceType"},"metadata":{"description":"metadata is JSON for the type-specific Evidence metadata message.\nThe chain stores protobuf-binary bytes derived from this JSON.","type":"string"},"subject_address":{"type":"string"}}},"lumera.audit.v1.MsgSubmitEvidenceResponse":{"type":"object","properties":{"evidence_id":{"type":"string","format":"uint64"}}},"lumera.audit.v1.MsgUpdateParams":{"type":"object","properties":{"authority":{"type":"string"},"params":{"$ref":"#/definitions/lumera.audit.v1.Params"}}},"lumera.audit.v1.MsgUpdateParamsResponse":{"type":"object"},"lumera.audit.v1.Params":{"description":"Params defines the parameters for the audit module.","type":"object","properties":{"action_finalization_not_in_top10_consecutive_epochs":{"description":"action_finalization_not_in_top10_consecutive_epochs is the consecutive epochs threshold\nfor EVIDENCE_TYPE_ACTION_FINALIZATION_NOT_IN_TOP_10.","type":"integer","format":"int64"},"action_finalization_not_in_top10_evidences_per_epoch":{"description":"action_finalization_not_in_top10_evidences_per_epoch is the per-epoch count threshold\nfor EVIDENCE_TYPE_ACTION_FINALIZATION_NOT_IN_TOP_10.","type":"integer","format":"int64"},"action_finalization_recovery_epochs":{"description":"action_finalization_recovery_epochs is the number of epochs to wait before considering recovery.","type":"integer","format":"int64"},"action_finalization_recovery_max_total_bad_evidences":{"description":"action_finalization_recovery_max_total_bad_evidences is the maximum allowed total count of bad\naction-finalization evidences in the recovery epoch-span for auto-recovery to occur.\nRecovery happens ONLY IF total_bad \u003c this value.","type":"integer","format":"int64"},"action_finalization_signature_failure_consecutive_epochs":{"description":"action_finalization_signature_failure_consecutive_epochs is the consecutive epochs threshold\nfor EVIDENCE_TYPE_ACTION_FINALIZATION_SIGNATURE_FAILURE.","type":"integer","format":"int64"},"action_finalization_signature_failure_evidences_per_epoch":{"description":"action_finalization_signature_failure_evidences_per_epoch is the per-epoch count threshold\nfor EVIDENCE_TYPE_ACTION_FINALIZATION_SIGNATURE_FAILURE.","type":"integer","format":"int64"},"consecutive_epochs_to_postpone":{"description":"Number of consecutive epochs a required port must be reported CLOSED by peers\nat or above peer_port_postpone_threshold_percent before postponing the supernode.","type":"integer","format":"int64"},"epoch_length_blocks":{"type":"string","format":"uint64"},"epoch_zero_height":{"description":"epoch_zero_height defines the reference chain height at which epoch_id = 0 starts.\nThis makes epoch boundaries deterministic from genesis without needing to query state.","type":"string","format":"uint64"},"keep_last_epoch_entries":{"description":"How many completed epochs to keep in state for epoch-scoped data like EpochReport\nand related indices. Pruning runs at epoch end.","type":"string","format":"uint64"},"max_probe_targets_per_epoch":{"type":"integer","format":"int64"},"min_cpu_free_percent":{"description":"Minimum required host free capacity (self reported).\nfree% = 100 - usage%\nA usage% of 0 is treated as \"unknown\" (no action).","type":"integer","format":"int64"},"min_disk_free_percent":{"type":"integer","format":"int64"},"min_mem_free_percent":{"type":"integer","format":"int64"},"min_probe_targets_per_epoch":{"type":"integer","format":"int64"},"peer_port_postpone_threshold_percent":{"description":"Minimum percent (1-100) of peer reports that must report a required port as CLOSED\nfor the port to be treated as CLOSED for postponement purposes.\n\n100 means unanimous.\nExample: to approximate a 2/3 threshold, use 66 (since 2/3 ≈ 66.6%).","type":"integer","format":"int64"},"peer_quorum_reports":{"type":"integer","format":"int64"},"required_open_ports":{"type":"array","items":{"type":"integer","format":"int64"}},"sc_challengers_per_epoch":{"type":"integer","format":"int64"},"sc_enabled":{"description":"Storage Challenge (SC) params.","type":"boolean"}}},"lumera.audit.v1.PortState":{"type":"string","default":"PORT_STATE_UNKNOWN","enum":["PORT_STATE_UNKNOWN","PORT_STATE_OPEN","PORT_STATE_CLOSED"]},"lumera.audit.v1.QueryAssignedTargetsResponse":{"type":"object","properties":{"epoch_id":{"type":"string","format":"uint64"},"epoch_start_height":{"type":"string","format":"int64"},"required_open_ports":{"type":"array","items":{"type":"integer","format":"int64"}},"target_supernode_accounts":{"type":"array","items":{"type":"string"}}}},"lumera.audit.v1.QueryCurrentEpochAnchorResponse":{"type":"object","properties":{"anchor":{"$ref":"#/definitions/lumera.audit.v1.EpochAnchor"}}},"lumera.audit.v1.QueryCurrentEpochResponse":{"type":"object","properties":{"epoch_end_height":{"type":"string","format":"int64"},"epoch_id":{"type":"string","format":"uint64"},"epoch_start_height":{"type":"string","format":"int64"}}},"lumera.audit.v1.QueryEpochAnchorResponse":{"type":"object","properties":{"anchor":{"$ref":"#/definitions/lumera.audit.v1.EpochAnchor"}}},"lumera.audit.v1.QueryEpochReportResponse":{"type":"object","properties":{"report":{"$ref":"#/definitions/lumera.audit.v1.EpochReport"}}},"lumera.audit.v1.QueryEpochReportsByReporterResponse":{"type":"object","properties":{"pagination":{"$ref":"#/definitions/cosmos.base.query.v1beta1.PageResponse"},"reports":{"type":"array","items":{"type":"object","$ref":"#/definitions/lumera.audit.v1.EpochReport"}}}},"lumera.audit.v1.QueryEvidenceByActionResponse":{"type":"object","properties":{"evidence":{"type":"array","items":{"type":"object","$ref":"#/definitions/lumera.audit.v1.Evidence"}},"pagination":{"$ref":"#/definitions/cosmos.base.query.v1beta1.PageResponse"}}},"lumera.audit.v1.QueryEvidenceByIdResponse":{"type":"object","properties":{"evidence":{"$ref":"#/definitions/lumera.audit.v1.Evidence"}}},"lumera.audit.v1.QueryEvidenceBySubjectResponse":{"type":"object","properties":{"evidence":{"type":"array","items":{"type":"object","$ref":"#/definitions/lumera.audit.v1.Evidence"}},"pagination":{"$ref":"#/definitions/cosmos.base.query.v1beta1.PageResponse"}}},"lumera.audit.v1.QueryHostReportsResponse":{"type":"object","properties":{"pagination":{"$ref":"#/definitions/cosmos.base.query.v1beta1.PageResponse"},"reports":{"type":"array","items":{"type":"object","$ref":"#/definitions/lumera.audit.v1.HostReportEntry"}}}},"lumera.audit.v1.QueryParamsResponse":{"type":"object","properties":{"params":{"$ref":"#/definitions/lumera.audit.v1.Params"}}},"lumera.audit.v1.QueryStorageChallengeReportsResponse":{"type":"object","properties":{"pagination":{"$ref":"#/definitions/cosmos.base.query.v1beta1.PageResponse"},"reports":{"type":"array","items":{"type":"object","$ref":"#/definitions/lumera.audit.v1.StorageChallengeReport"}}}},"lumera.audit.v1.StorageChallengeObservation":{"description":"StorageChallengeObservation is a prober's reachability observation about an assigned target.","type":"object","properties":{"port_states":{"description":"port_states[i] refers to required_open_ports[i] for the epoch.","type":"array","items":{"$ref":"#/definitions/lumera.audit.v1.PortState"}},"target_supernode_account":{"type":"string"}}},"lumera.audit.v1.StorageChallengeReport":{"type":"object","properties":{"epoch_id":{"type":"string","format":"uint64"},"port_states":{"type":"array","items":{"$ref":"#/definitions/lumera.audit.v1.PortState"}},"report_height":{"type":"string","format":"int64"},"reporter_supernode_account":{"type":"string"}}},"lumera.claim.ClaimRecord":{"description":"ClaimRecord represents a record of a claim made by a user.","type":"object","properties":{"balance":{"type":"array","items":{"type":"object","$ref":"#/definitions/cosmos.base.v1beta1.Coin"}},"claimTime":{"type":"string","format":"int64"},"claimed":{"type":"boolean"},"destAddress":{"type":"string"},"oldAddress":{"type":"string"},"vestedTier":{"type":"integer","format":"int64"}}},"lumera.claim.MsgClaim":{"description":"MsgClaim is the Msg/Claim request type.","type":"object","properties":{"creator":{"type":"string"},"newAddress":{"type":"string"},"oldAddress":{"type":"string"},"pubKey":{"type":"string"},"signature":{"type":"string"}}},"lumera.claim.MsgClaimResponse":{"type":"object","title":"MsgClaimResponse defines the response structure for executing a"},"lumera.claim.MsgDelayedClaim":{"type":"object","properties":{"creator":{"type":"string"},"newAddress":{"type":"string"},"oldAddress":{"type":"string"},"pubKey":{"type":"string"},"signature":{"type":"string"},"tier":{"type":"integer","format":"int64"}}},"lumera.claim.MsgDelayedClaimResponse":{"type":"object"},"lumera.claim.MsgUpdateParams":{"description":"MsgUpdateParams is the Msg/UpdateParams request type.\nMsgUpdateParams is the Msg/UpdateParams request type.","type":"object","properties":{"authority":{"description":"authority is the address that controls the module (defaults to x/gov unless overwritten).","type":"string"},"params":{"description":"params defines the x/claim parameters to update.\nNOTE: All parameters must be supplied.","$ref":"#/definitions/lumera.claim.Params"}}},"lumera.claim.MsgUpdateParamsResponse":{"description":"MsgUpdateParamsResponse defines the response structure for executing a\nMsgUpdateParams message.","type":"object"},"lumera.claim.Params":{"description":"Params defines the parameters for the module.","type":"object","properties":{"claim_end_time":{"type":"string","format":"int64"},"enable_claims":{"type":"boolean"},"max_claims_per_block":{"type":"string","format":"uint64"}}},"lumera.claim.QueryClaimRecordResponse":{"description":"QueryClaimRecordResponse is response type for the Query/ClaimRecord RPC method.","type":"object","properties":{"record":{"$ref":"#/definitions/lumera.claim.ClaimRecord"}}},"lumera.claim.QueryListClaimedResponse":{"type":"object","properties":{"claims":{"type":"array","items":{"type":"object","$ref":"#/definitions/lumera.claim.ClaimRecord"}},"pagination":{"$ref":"#/definitions/cosmos.base.query.v1beta1.PageResponse"}}},"lumera.claim.QueryParamsResponse":{"description":"QueryParamsResponse is response type for the Query/Params RPC method.","type":"object","properties":{"params":{"description":"params holds all the parameters of this module.","$ref":"#/definitions/lumera.claim.Params"}}},"lumera.erc20policy.MsgSetRegistrationPolicy":{"description":"MsgSetRegistrationPolicy configures the IBC voucher ERC20 auto-registration\npolicy. It allows governance to control which IBC denoms are automatically\nregistered as ERC20 token pairs on first IBC receive.","type":"object","properties":{"add_base_denoms":{"description":"add_base_denoms is a list of base token denominations (e.g. \"uatom\",\n\"uosmo\") to add to the base denom allowlist. Base denom matching is\nchannel-independent: approving \"uatom\" allows ATOM arriving via any\nIBC channel or multi-hop path.","type":"array","items":{"type":"string"}},"add_denoms":{"description":"add_denoms is a list of exact IBC denoms (e.g. \"ibc/HASH...\") to add to\nthe allowlist. Only meaningful when mode is \"allowlist\".","type":"array","items":{"type":"string"}},"authority":{"description":"authority is the address that controls the policy (defaults to x/gov).","type":"string"},"mode":{"description":"mode is the registration policy mode: \"all\", \"allowlist\", or \"none\".\nIf empty, the mode is not changed.","type":"string"},"remove_base_denoms":{"description":"remove_base_denoms is a list of base denominations to remove from the\nbase denom allowlist.","type":"array","items":{"type":"string"}},"remove_denoms":{"description":"remove_denoms is a list of exact IBC denoms to remove from the allowlist.","type":"array","items":{"type":"string"}}}},"lumera.erc20policy.MsgSetRegistrationPolicyResponse":{"description":"MsgSetRegistrationPolicyResponse is the response type for\nMsgSetRegistrationPolicy.","type":"object"},"lumera.evmigration.LegacyAccountInfo":{"description":"LegacyAccountInfo provides summary information about a legacy account\nthat has not yet been migrated.","type":"object","properties":{"address":{"description":"address is the bech32 account address.","type":"string"},"balance_summary":{"description":"balance_summary is a human-readable total balance across all denoms.","type":"string"},"has_delegations":{"description":"has_delegations is true if the account has active staking delegations.","type":"boolean"},"is_validator":{"description":"is_validator is true if the account is a validator operator.","type":"boolean"}}},"lumera.evmigration.MigrationRecord":{"description":"MigrationRecord stores the result of a completed legacy account migration,\nrecording the source and destination addresses plus the time and height.","type":"object","properties":{"legacy_address":{"description":"legacy_address is the coin-type-118 source address that was migrated.","type":"string"},"migration_height":{"description":"migration_height is the block height when migration completed.","type":"string","format":"int64"},"migration_time":{"description":"migration_time is the block time (unix seconds) when migration completed.","type":"string","format":"int64"},"new_address":{"description":"new_address is the coin-type-60 destination address.","type":"string"}}},"lumera.evmigration.MsgClaimLegacyAccount":{"description":"MsgClaimLegacyAccount migrates on-chain state from legacy_address to new_address.","type":"object","properties":{"legacy_address":{"description":"legacy_address: source (coin-type-118) to migrate from.","type":"string"},"legacy_pub_key":{"description":"legacy_pub_key: compressed secp256k1 public key of legacy account.","type":"string","format":"byte"},"legacy_signature":{"description":"legacy_signature: secp256k1 signature over\n  SHA256(\"lumera-evm-migration:claim:\u003clegacy_address\u003e:\u003cnew_address\u003e\")\nproving legacy key holder consents to the EVM migration.","type":"string","format":"byte"},"new_address":{"description":"new_address is the destination coin-type-60 account.","type":"string"},"new_pub_key":{"description":"new_pub_key: compressed eth_secp256k1 public key of the destination account.","type":"string","format":"byte"},"new_signature":{"description":"new_signature: eth_secp256k1 signature over\n  Keccak256(\"lumera-evm-migration:claim:\u003clegacy_address\u003e:\u003cnew_address\u003e\")\nproving the destination key holder consents to receive migrated state.","type":"string","format":"byte"}}},"lumera.evmigration.MsgClaimLegacyAccountResponse":{"description":"MsgClaimLegacyAccountResponse is the response type for MsgClaimLegacyAccount.","type":"object"},"lumera.evmigration.MsgMigrateValidator":{"description":"MsgMigrateValidator migrates a validator operator from legacy to new address.\nThe validator record, all delegations/unbondings/redelegations pointing to it,\ndistribution state, supernode record, and action references are all re-keyed.\nAlso performs full account migration (bank, auth, authz, feegrant) like\nMsgClaimLegacyAccount.","type":"object","properties":{"legacy_address":{"description":"legacy_address is the coin-type-118 validator operator address.","type":"string"},"legacy_pub_key":{"description":"legacy_pub_key is the compressed secp256k1 public key of the legacy account.","type":"string","format":"byte"},"legacy_signature":{"description":"legacy_signature: secp256k1 signature over\n  SHA256(\"lumera-evm-migration:validator:\u003clegacy_address\u003e:\u003cnew_address\u003e\")\nproving legacy key holder consents to the EVM migration.","type":"string","format":"byte"},"new_address":{"description":"new_address is the coin-type-60 destination address.","type":"string"},"new_pub_key":{"description":"new_pub_key is the compressed eth_secp256k1 public key of the destination account.","type":"string","format":"byte"},"new_signature":{"description":"new_signature: eth_secp256k1 signature over\n  Keccak256(\"lumera-evm-migration:validator:\u003clegacy_address\u003e:\u003cnew_address\u003e\")\nproving the destination key holder consents to receive the migrated validator state.","type":"string","format":"byte"}}},"lumera.evmigration.MsgMigrateValidatorResponse":{"description":"MsgMigrateValidatorResponse is the response type for MsgMigrateValidator.","type":"object"},"lumera.evmigration.MsgUpdateParams":{"description":"MsgUpdateParams is the Msg/UpdateParams request type.","type":"object","properties":{"authority":{"description":"authority is the address that controls the module (defaults to x/gov unless overwritten).","type":"string"},"params":{"description":"params defines the module parameters to update.\n\nNOTE: All parameters must be supplied.","$ref":"#/definitions/lumera.evmigration.Params"}}},"lumera.evmigration.MsgUpdateParamsResponse":{"description":"MsgUpdateParamsResponse defines the response structure for executing a\nMsgUpdateParams message.","type":"object"},"lumera.evmigration.Params":{"description":"Params defines the governance-controlled parameters for the evmigration module.\nThese knobs determine when migrations are accepted and how much work the\nchain performs per block during the legacy-to-EVM migration window.","type":"object","properties":{"enable_migration":{"description":"enable_migration is the master switch for the migration window.\nWhen false, all MsgClaimLegacyAccount and MsgMigrateValidator messages\nare rejected regardless of other parameter values.\nGovernance should set this to false once the migration window closes.\nDefault: true.","type":"boolean"},"max_migrations_per_block":{"description":"max_migrations_per_block is the maximum number of MsgClaimLegacyAccount\nmessages processed in a single block. Once this limit is reached,\nadditional claims in the same block are rejected. This prevents a burst\nof migrations from consuming excessive block gas.\nDefault: 50.","type":"string","format":"uint64"},"max_validator_delegations":{"description":"max_validator_delegations is the safety cap for MsgMigrateValidator.\nA validator migration must re-key every delegation and unbonding-delegation\nrecord. If the total count exceeds this threshold the message is rejected\nbecause the gas cost of iterating all records would be prohibitive.\nValidators that exceed the cap must shed delegations before migrating.\nDefault: 2000.","type":"string","format":"uint64"},"migration_end_time":{"description":"migration_end_time is an optional hard deadline expressed as a unix\ntimestamp (seconds). If non-zero, any migration message whose block time\nexceeds this value is rejected. A value of 0 disables the deadline,\nleaving enable_migration as the sole on/off control.\nDefault: 0 (no deadline).","type":"string","format":"int64"}}},"lumera.evmigration.QueryLegacyAccountsResponse":{"description":"QueryLegacyAccountsResponse is the response type for the Query/LegacyAccounts RPC method.","type":"object","properties":{"accounts":{"description":"accounts is the list of legacy accounts that need migration.","type":"array","items":{"type":"object","$ref":"#/definitions/lumera.evmigration.LegacyAccountInfo"}},"pagination":{"description":"pagination defines the pagination in the response.","$ref":"#/definitions/cosmos.base.query.v1beta1.PageResponse"}}},"lumera.evmigration.QueryMigratedAccountsResponse":{"description":"QueryMigratedAccountsResponse is the response type for the Query/MigratedAccounts RPC method.","type":"object","properties":{"pagination":{"description":"pagination defines the pagination in the response.","$ref":"#/definitions/cosmos.base.query.v1beta1.PageResponse"},"records":{"description":"records is the list of completed migration records.","type":"array","items":{"type":"object","$ref":"#/definitions/lumera.evmigration.MigrationRecord"}}}},"lumera.evmigration.QueryMigrationEstimateResponse":{"description":"QueryMigrationEstimateResponse is the response type for the Query/MigrationEstimate RPC method.\nIt provides a dry-run estimate of what would be migrated.","type":"object","properties":{"action_count":{"description":"action_count is the number of action records where this address appears\neither as creator or in the SuperNodes list.","type":"string","format":"uint64"},"authz_grant_count":{"description":"authz_grant_count is the number of authz grants as granter or grantee.","type":"string","format":"uint64"},"delegation_count":{"description":"delegation_count is the number of active delegations from this address.","type":"string","format":"uint64"},"feegrant_count":{"description":"feegrant_count is the number of fee allowances as granter or grantee.","type":"string","format":"uint64"},"is_validator":{"description":"is_validator is true if the legacy address is a validator operator.","type":"boolean"},"redelegation_count":{"description":"redelegation_count is the number of redelegation entries.","type":"string","format":"uint64"},"rejection_reason":{"description":"rejection_reason is non-empty if would_succeed is false.","type":"string"},"total_touched":{"description":"total_touched is the sum of all records that would be re-keyed.","type":"string","format":"uint64"},"unbonding_count":{"description":"unbonding_count is the number of unbonding delegation entries.","type":"string","format":"uint64"},"val_delegation_count":{"description":"val_delegation_count is delegations TO this validator (from all delegators).\nPopulated only when is_validator is true.","type":"string","format":"uint64"},"val_redelegation_count":{"description":"val_redelegation_count is redelegations referencing this validator as src or dst.\nPopulated only when is_validator is true.","typ