syntax = "proto3";
package lumera.action.v1;

option go_package = "x/action/v1/types";

import "gogoproto/gogo.proto";

// HashAlgo enumerates the supported hash algorithms for availability
// commitments.
enum HashAlgo {
  HASH_ALGO_UNSPECIFIED = 0;
  HASH_ALGO_BLAKE3      = 1;
  HASH_ALGO_SHA256      = 2;
}

// SenseMetadata contains information for Sense actions.
// This metadata is directly embedded in the Action.metadata field.
// For RequestAction:
//   - Required: data_hash, dd_and_fingerprints_ic
//   - Optional: collection_id, group_id
// Keeper will add:
//   - dd_and_fingerprints_max (from module params)
// For FinalizeAction:
//   - Required: dd_and_fingerprints_ids, signatures
message SenseMetadata {
  // RequestAction required fields
  string data_hash = 1 [json_name = "data_hash"];
  uint64 dd_and_fingerprints_ic = 2 [json_name = "dd_and_fingerprints_ic"];
  
  // RequestAction optional fields
  string collection_id = 3 [json_name = "collection_id"];
  string group_id = 4 [json_name = "group_id"];
  
  // Added by Keeper
  uint64 dd_and_fingerprints_max = 5 [json_name = "dd_and_fingerprints_max"];
  
  // FinalizeAction fields
  repeated string dd_and_fingerprints_ids = 6 [json_name = "dd_and_fingerprints_ids"];
  string signatures = 7 [json_name = "signatures"];
}

// AvailabilityCommitment is the LEP-5 on-chain file commitment included
// during Cascade registration.
message AvailabilityCommitment {
  string commitment_type = 1 [json_name = "commitment_type"];
  HashAlgo hash_algo = 2 [json_name = "hash_algo"];
  uint32 chunk_size = 3 [json_name = "chunk_size"];
  uint64 total_size = 4 [json_name = "total_size"];
  uint32 num_chunks = 5 [json_name = "num_chunks"];
  bytes root = 6 [json_name = "root"];
  // Challenge indices chosen by the client at registration time.
  // The SuperNode must provide Merkle proofs for these exact chunk
  // indices during finalization. The keeper validates proofs match
  // these stored indices and the committed root.
  repeated uint32 challenge_indices = 7 [json_name = "challenge_indices"];
}

// ChunkProof is a Merkle inclusion proof for one challenged chunk.
message ChunkProof {
  uint32 chunk_index = 1 [json_name = "chunk_index"];
  bytes leaf_hash = 2 [json_name = "leaf_hash"];
  repeated bytes path_hashes = 3 [json_name = "path_hashes"];
  repeated bool path_directions = 4 [json_name = "path_directions"];
}
  
// CascadeMetadata contains information for Cascade actions.
// This metadata is directly embedded in the Action.metadata field.
// For RequestAction:
//   - Required: data_hash, file_name, rq_ids_ic, signatures
// Keeper will add:
//   - rq_ids_max (from module params)
// For FinalizeAction:
//   - Required: rq_ids_ids
message CascadeMetadata {
  // RequestAction required fields
  string data_hash = 1 [json_name = "data_hash"];
  string file_name = 2 [json_name = "file_name"];
  uint64 rq_ids_ic = 3 [json_name = "rq_ids_ic"];
  
  // Added by Keeper
  uint64 rq_ids_max = 4 [json_name = "rq_ids_max"];
  
  // FinalizeAction fields
  repeated string rq_ids_ids = 5 [json_name = "rq_ids_ids", (gogoproto.nullable) = true];
  // RequestAction required field
  string signatures = 6 [json_name = "signatures"];
  // Indicates whether the action is publicly visible. Set to true to
  // mark the action as visible to all users; set to false for private
  // or restricted actions.
  bool public = 7 [json_name = "public"];

  // LEP-5 fields
  AvailabilityCommitment availability_commitment = 8 [json_name = "availability_commitment"];
  repeated ChunkProof chunk_proofs = 9 [json_name = "chunk_proofs"];
}
