syntax = "proto3";
package lumera.evmigration;

import "amino/amino.proto";
import "cosmos/msg/v1/msg.proto";
import "cosmos_proto/cosmos.proto";
import "gogoproto/gogo.proto";
import "lumera/evmigration/params.proto";
import "lumera/evmigration/proof.proto";

option go_package = "x/evmigration/types";

// Msg defines the Msg service.
service Msg {
  option (cosmos.msg.v1.service) = true;

  // UpdateParams defines a (governance) operation for updating the module
  // parameters. The authority defaults to the x/gov module account.
  rpc UpdateParams(MsgUpdateParams) returns (MsgUpdateParamsResponse);

  // ClaimLegacyAccount migrates all on-chain state from a legacy (coin-type-118)
  // address to a new (coin-type-60) address. Requires dual-signature proof.
  rpc ClaimLegacyAccount(MsgClaimLegacyAccount) returns (MsgClaimLegacyAccountResponse);

  // MigrateValidator migrates a validator operator from legacy to new address,
  // including all delegations, distribution state, supernode records, and
  // account-level state.
  rpc MigrateValidator(MsgMigrateValidator) returns (MsgMigrateValidatorResponse);
}

// MsgUpdateParams is the Msg/UpdateParams request type.
message MsgUpdateParams {
  option (cosmos.msg.v1.signer) = "authority";
  option (amino.name) = "lumera/x/evmigration/MsgUpdateParams";

  // authority is the address that controls the module (defaults to x/gov unless overwritten).
  string authority = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];

  // params defines the module parameters to update.
  //
  // NOTE: All parameters must be supplied.
  Params params = 2 [
    (gogoproto.nullable) = false,
    (amino.dont_omitempty) = true
  ];
}

// MsgUpdateParamsResponse defines the response structure for executing a
// MsgUpdateParams message.
message MsgUpdateParamsResponse {}

// MsgClaimLegacyAccount migrates on-chain state from legacy_address to new_address.
message MsgClaimLegacyAccount {
  // new_address is the destination coin-type-60 account.
  string new_address = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];

  // legacy_address: source (coin-type-118) to migrate from.
  string legacy_address = 2 [(cosmos_proto.scalar) = "cosmos.AddressString"];

  // legacy_proof authenticates the legacy key holder's consent to migrate.
  // Exactly one of single / multisig must be set (see proof.proto).
  LegacyProof legacy_proof = 3 [(gogoproto.nullable) = false];

  // new_signature: eth_secp256k1 signature over
  //   Keccak256("lumera-evm-migration:<chain_id>:<evm_chain_id>:claim:<legacy_address>:<new_address>")
  // proving the destination key holder consents to receive migrated state.
  // Also accepts EIP-191 personal_sign signatures (Keplr/Leap wallet path).
  bytes new_signature = 5;

  reserved 4;
  reserved "legacy_pub_key", "legacy_signature";
}

// MsgClaimLegacyAccountResponse is the response type for MsgClaimLegacyAccount.
message MsgClaimLegacyAccountResponse {}

// MsgMigrateValidator migrates a validator operator from legacy to new address.
// The validator record, all delegations/unbondings/redelegations pointing to it,
// distribution state, supernode record, and action references are all re-keyed.
// Also performs full account migration (bank, auth, authz, feegrant) like
// MsgClaimLegacyAccount.
message MsgMigrateValidator {
  // new_address is the coin-type-60 destination address.
  string new_address = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];

  // legacy_address is the coin-type-118 validator operator address.
  string legacy_address = 2 [(cosmos_proto.scalar) = "cosmos.AddressString"];

  // legacy_proof authenticates the legacy validator operator's consent to migrate.
  LegacyProof legacy_proof = 3 [(gogoproto.nullable) = false];

  // new_signature: eth_secp256k1 signature over
  //   Keccak256("lumera-evm-migration:<chain_id>:<evm_chain_id>:validator:<legacy_address>:<new_address>")
  // proving the destination key holder consents to receive the migrated validator state.
  // Also accepts EIP-191 personal_sign signatures (Keplr/Leap wallet path).
  bytes new_signature = 5;

  reserved 4;
  reserved "legacy_pub_key", "legacy_signature";
}

// MsgMigrateValidatorResponse is the response type for MsgMigrateValidator.
message MsgMigrateValidatorResponse {}
